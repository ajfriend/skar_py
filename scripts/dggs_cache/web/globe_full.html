<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ivea7h full globe — ajglobe</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0e13; overflow: hidden;
    font: 13px ui-monospace, Menlo, monospace; color: #9aa7b4; }
  #c { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; }
  #c:active { cursor: grabbing; }
  #c:focus { outline: none; }
  #hud { position: absolute; top: 14px; left: 16px; z-index: 10;
    background: #0b0e13cc; border: 1px solid #2a323d; border-radius: 8px;
    padding: 10px 13px; line-height: 1.6; }
  #hud b { color: #e6edf3; }
  .seg { display: inline-flex; border: 1px solid #2a323d; border-radius: 6px; overflow: hidden; margin-right: 8px; }
  .seg button { background: #1c232d; color: #9aa7b4; border: none; padding: 4px 12px;
    cursor: pointer; font: inherit; }
  .seg button.on { background: #58a6ff; color: #06121f; }
  #status { display: block; margin-top: 7px; }
  #cell { display: block; margin-top: 4px; color: #7d8b99; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <span id="title"></span>
  <span class="seg" id="resSel" style="margin-left:8px"></span>
  <span id="status">loading…</span>
  <span id="cell">hover a cell…</span>
</div>

<script type="module">
import { Orb } from './vendor/ajglobe.min.js';
import { DNC_GREY, lut, fetchBin, sortedFinite, quantileT } from './_shared.js';

// The system + levels the full-enumeration pipeline generated (see
// gen_ivea7h_full_geom.py / build_ivea7h_full_ar.py — keep in sync with their
// SYSTEM / RES_LIST).
const SYSTEM = 'ivea7h';
const RES_LIST = [1, 2, 3, 5, 6];
const START_RES = 5;

document.getElementById('title').textContent = `${SYSTEM} — every cell`;
const resSel = document.getElementById('resSel');
for (const r of RES_LIST) {
  const b = document.createElement('button');
  b.dataset.r = r;
  b.textContent = `r${r}`;
  b.classList.toggle('on', r === START_RES);
  resSel.appendChild(b);
}

const orb = new Orb(document.getElementById('c'), { background: '#0b0e13', sphere: '#11151c' });
orb.canvas.focus();                        // arrows/WASD/QE rotate the focused globe
document.getElementById('hud').addEventListener('click', () => orb.canvas.focus());
orb.lookAt(180, 10);
window.orb = orb;                          // console / bench access

const status = document.getElementById('status');
const cellEl = document.getElementById('cell');
const cache = new Map();
let layer = null, cur = null;
let epoch = 0;                             // ignore stale async switches

// Color by the cell's quantile within the level (precomputed at load — the
// fill callback runs once per cell, up to 1.18M), matching the explorer's
// per-globe mode.
const paint = (i) => (Number.isNaN(cur.qt[i]) ? DNC_GREY : lut(cur.qt[i]));

async function show(res) {
  const e = ++epoch;
  status.textContent = `loading r${res} binaries…`;
  if (!cache.has(res)) {
    cache.set(res, Promise.all([
      fetchBin(`out/full/${SYSTEM}_r${res}_pos.f32`, Float32Array),
      fetchBin(`out/full/${SYSTEM}_r${res}_idx.u32`, Uint32Array),
      fetchBin(`out/full/${SYSTEM}_r${res}_ar.f32`, Float32Array),
    ]).then(([pos, starts, ar]) => {
      const sorted = sortedFinite(ar);
      return { pos, starts, ar, qt: quantileT(ar, sorted), arMax: sorted[sorted.length - 1] };
    }));
  }
  let d;
  try { d = await cache.get(res); }
  catch (err) {
    cache.delete(res);
    status.textContent = `r${res}: ${err.message} — run \`just web-full-geom\` + \`just web-full\``;
    return;
  }
  if (e !== epoch) return;
  cur = d;
  const t0 = performance.now();
  if (layer) layer.remove();
  layer = orb.polygons({ lnglat: d.pos, starts: d.starts, fill: paint });
  const nCells = d.starts.length - 1;
  status.innerHTML =
    `<b>${nCells.toLocaleString()}</b> cells · <b>${(d.pos.length / 2).toLocaleString()}</b> verts · `
    + `max AR <b>${d.arMax.toFixed(3)}</b> · built <b>${Math.round(performance.now() - t0)} ms</b> · drag to rotate`;
}

// Hover: GPU pick -> highlight tint + index/AR readout.
orb.on('hover', (e) => {
  orb.highlight(e.index ?? -1, layer);
  cellEl.textContent = (e.index == null || !cur) ? 'hover a cell…'
    : `cell #${e.index.toLocaleString()} · AR ${Number.isFinite(cur.ar[e.index]) ? cur.ar[e.index].toFixed(4) : 'DNC'}`;
});

resSel.addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  resSel.querySelectorAll('button').forEach((x) => x.classList.toggle('on', x === b));
  show(+b.dataset.r);
});

show(START_RES);
</script>
</body>
</html>
