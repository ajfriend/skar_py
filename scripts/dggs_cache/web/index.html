<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DGGS aspect-ratio explorer</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c232d;
    --line: #2a323d;
    --ink: #e6edf3;
    --ink-dim: #9aa7b4;
    --ink-faint: #6b7682;
    --accent: #58a6ff;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--sans);
    font-size: 14px; line-height: 1.45;
  }
  header {
    display: flex; align-items: baseline; gap: 18px;
    padding: 14px 22px; border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: .2px; }
  header .sub { color: var(--ink-faint); font-size: 12px; font-family: var(--mono); }
  nav { margin-left: auto; display: flex; gap: 4px; }
  nav button {
    background: transparent; color: var(--ink-dim); border: 1px solid transparent;
    padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 13px;
    font-family: var(--sans);
  }
  nav button:hover { color: var(--ink); background: var(--panel); }
  nav button.active { color: var(--ink); background: var(--panel-2); border-color: var(--line); }

  main { padding: 18px 22px; }
  .view { display: none; }
  .view.active { display: block; }

  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 18px; align-items: start; }
  .panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px;
  }
  .panel h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--ink-faint); margin: 0 0 10px; font-weight: 600;
  }
  .panel h2:not(:first-child) { margin-top: 18px; }

  .sys-block { margin-bottom: 10px; }
  .sys-name {
    display: flex; align-items: center; gap: 7px; font-family: var(--mono);
    font-size: 12px; margin-bottom: 5px; color: var(--ink-dim);
  }
  .swatch { width: 10px; height: 10px; border-radius: 2px; flex: none; }
  .chips { display: flex; flex-wrap: wrap; gap: 3px; }
  .chip {
    font-family: var(--mono); font-size: 11px; padding: 2px 6px; border-radius: 5px;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink-faint);
    cursor: pointer; user-select: none;
  }
  .chip:hover { color: var(--ink); border-color: var(--ink-faint); }
  .chip.on { color: #fff; border-color: transparent; }
  .chip.target { box-shadow: inset 0 -2px 0 0 currentColor; }

  .ctl-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 8px 0; }
  .ctl-row label { color: var(--ink-dim); font-size: 12px; }
  input[type=range] { width: 130px; accent-color: var(--accent); }
  select {
    background: var(--panel-2); color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 4px 8px; font-family: var(--mono); font-size: 12px;
  }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .seg button {
    background: var(--panel-2); color: var(--ink-dim); border: none; padding: 4px 10px;
    cursor: pointer; font-size: 12px; font-family: var(--mono);
  }
  .seg button.on { background: var(--accent); color: #06121f; }
  .hint { color: var(--ink-faint); font-size: 11px; margin-top: 6px; line-height: 1.4; }

  #histPlot { min-height: 460px; }
  .legend-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; margin-top: 14px; }
  .legend-table th { text-align: right; color: var(--ink-faint); font-weight: 500; padding: 3px 8px; border-bottom: 1px solid var(--line); }
  .legend-table th:first-child { text-align: left; }
  .legend-table td { text-align: right; padding: 3px 8px; border-bottom: 1px solid var(--panel-2); color: var(--ink-dim); }
  .legend-table td:first-child { text-align: left; color: var(--ink); }
  .legend-table .sw { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 6px; vertical-align: baseline; }
  .legend-table td.dnc { color: #f0883e; }

  .globes { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .globe-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
  .globe-head { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .globe-head .label { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); margin-left: auto; }
  .globe-holder { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #0b0e13;
    border-radius: 6px; overflow: hidden; cursor: grab; touch-action: none; }
  .globe-holder:active { cursor: grabbing; }
  .globe-holder canvas { position: absolute; inset: 0; width: 100%; height: 100%;
    display: block; border-radius: 6px; }
  .globe-holder canvas:focus { outline: none; }
  .globe-controls { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-bar { display: flex; align-items: center; gap: 10px; }
  .legend-grad { height: 12px; width: 220px; border-radius: 3px; border: 1px solid var(--line); }
  .legend-grad-labels { display: flex; justify-content: space-between; width: 220px; font-family: var(--mono); font-size: 10px; color: var(--ink-faint); }
  #tooltip {
    position: fixed; pointer-events: none; background: #000d; border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 9px; font-family: var(--mono); font-size: 11px;
    color: var(--ink); opacity: 0; transition: opacity .08s; z-index: 50; white-space: nowrap;
  }
  .checkbox { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-dim); font-size: 12px; cursor: pointer; }
  .checkbox input { accent-color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>DGGS aspect-ratio explorer</h1>
  <span class="sub" id="subtitle">loading…</span>
  <nav>
    <button id="tab-hist" class="active">Histograms</button>
    <button id="tab-globe">Globe</button>
  </nav>
</header>

<main>
  <!-- ===== Histograms ===== -->
  <section id="view-hist" class="view active">
    <div class="layout">
      <div class="panel">
        <h2>Series — system · resolution</h2>
        <div id="seriesPicker"></div>
        <p class="hint">Click resolutions to overlay. Underlined chip = the
          H3-r9-matched working resolution.</p>

        <h2>Display</h2>
        <div class="ctl-row">
          <label for="binSlider">bins</label>
          <input type="range" id="binSlider" min="16" max="256" step="8" value="96">
          <span class="sub" id="binVal" style="width:34px;text-align:right"></span>
        </div>
        <div class="ctl-row">
          <label>y axis</label>
          <span class="seg" id="yMode">
            <button data-v="density" class="on">density</button>
            <button data-v="count">count</button>
          </span>
        </div>
        <div class="ctl-row">
          <label>scale</label>
          <span class="seg" id="yScale">
            <button data-v="linear" class="on">linear</button>
            <button data-v="log">log</button>
          </span>
        </div>
        <p class="hint" id="histNote"></p>
      </div>

      <div class="panel">
        <div id="histPlot"></div>
        <table class="legend-table" id="statsTable"></table>
      </div>
    </div>
  </section>

  <!-- ===== Globe ===== -->
  <section id="view-globe" class="view">
    <div class="panel" style="margin-bottom:16px">
      <div class="globe-controls">
        <div class="legend-bar">
          <span style="color:var(--ink-faint);font-size:12px">aspect ratio</span>
          <div>
            <div class="legend-grad" id="legendGrad"></div>
            <div class="legend-grad-labels"><span id="legLo">1.0</span><span id="legHi"></span></div>
          </div>
        </div>
        <div class="ctl-row" style="margin:0">
          <label>color domain</label>
          <span class="seg" id="domainMode">
            <button data-v="shared">shared</button>
            <button data-v="adaptive" class="on">per-globe</button>
          </span>
        </div>
        <label class="checkbox"><input type="checkbox" id="spin"> auto-spin</label>
        <span class="hint" style="margin:0">Drag either globe — both rotate together.</span>
      </div>
    </div>
    <div class="globes">
      <div class="globe-card" id="card-A"></div>
      <div class="globe-card" id="card-B"></div>
    </div>
  </section>
</main>

<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/dist/plot.umd.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
