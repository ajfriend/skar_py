name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Non-editable so `uv sync` builds + installs skar as the wheel ships it
    # (no meson-python rebuild-on-import hook, which needs build isolation off).
    env:
      UV_NO_EDITABLE: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: test

      - uses: extractions/setup-just@v4

      - name: Install
        run: uv sync

      - name: Test + coverage
        run: just ci-test
